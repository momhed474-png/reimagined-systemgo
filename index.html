<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M / Momhed Mosthofe emam</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0e1a;
    --card: #0f1b35;
    --card2: #162040;
    --blue-light: #3a9bd5;
    --blue-mid: #1e5f9e;
    --blue-dark: #0d2a4f;
    --accent: #f5a623;
    --text: #ffffff;
    --text-muted: #8899bb;
    --radius: 20px;
  }

  body {
    font-family: 'Cairo', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 20px;
  }

  .page {
    width: 100%;
    max-width: 480px;
    background: var(--bg);
    border-radius: 30px;
    overflow: hidden;
    box-shadow: 0 30px 80px rgba(0,0,0,0.7);
    animation: fadeUp 0.7s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* === HEADER === */
  .header {
    position: relative;
    height: 220px;
    background: linear-gradient(160deg, #1a4a7a 0%, #0d2a4f 40%, #061522 100%);
    overflow: hidden;
  }

  .wave { position: absolute; border-radius: 50%; opacity: 0.45; }
  .wave1 { width: 340px; height: 340px; background: #1e6baa; top: -120px; right: -80px; }
  .wave2 { width: 220px; height: 220px; background: #3a9bd5; top: -80px; right: 20px; border-radius: 40% 60% 60% 40%; }
  .wave3 { width: 180px; height: 160px; background: #0e3d6e; bottom: -40px; left: -30px; border-radius: 60% 40%; }
  .wave4 { width: 120px; height: 120px; background: #1a5f95; bottom: 10px; left: 80px; border-radius: 50%; }

  /* === PROFILE SECTION === */
  .profile-section {
    padding: 24px 24px 10px;
    background: var(--bg);
    position: relative;
  }

  .profile-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-top: -50px;
    margin-bottom: 14px;
  }

  .avatar-wrap {
    position: relative;
  }

  .avatar-wrap img, .avatar-wrap .avatar-placeholder {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    border: 3px solid var(--blue-light);
    object-fit: cover;
    display: block;
    box-shadow: 0 0 0 4px rgba(58,155,213,0.25);
  }

  .avatar-placeholder {
    background: linear-gradient(135deg, var(--card2), var(--blue-dark));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 40px;
  }

  .upload-label {
    position: absolute;
    bottom: 4px;
    right: 4px;
    background: var(--blue-light);
    border-radius: 50%;
    width: 26px;
    height: 26px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 13px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    transition: transform 0.2s;
  }
  .upload-label:hover { transform: scale(1.15); }
  #avatar-input { display: none; }

  .profile-actions {
    display: flex;
    gap: 10px;
    align-items: center;
    margin-top: 56px;
  }

  .btn-save {
    background: #fff;
    color: #111;
    border: none;
    border-radius: 50px;
    padding: 10px 22px;
    font-size: 14px;
    font-weight: 700;
    font-family: 'Cairo', sans-serif;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 7px;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .btn-save:hover { transform: scale(1.04); box-shadow: 0 4px 16px rgba(255,255,255,0.15); }

  .btn-icon {
    background: var(--card2);
    border: none;
    border-radius: 50%;
    width: 42px;
    height: 42px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 18px;
    transition: background 0.2s;
  }
  .btn-icon:hover { background: var(--blue-mid); }

  .profile-name {
    font-size: 22px;
    font-weight: 900;
    line-height: 1.2;
    margin-bottom: 4px;
  }

  .profile-bio {
    color: var(--text-muted);
    font-size: 14px;
    margin-bottom: 6px;
  }

  /* === CONTACT CARDS === */
  .contacts {
    padding: 10px 24px 30px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .contact-card {
    background: linear-gradient(90deg, var(--card2) 0%, var(--card) 100%);
    border-radius: var(--radius);
    display: flex;
    align-items: center;
    overflow: hidden;
    text-decoration: none;
    color: inherit;
    transition: transform 0.22s, box-shadow 0.22s;
    animation: fadeUp 0.6s ease both;
  }
  .contact-card:hover { transform: translateY(-3px) scale(1.01); box-shadow: 0 8px 30px rgba(0,0,0,0.5); }

  .contact-icon {
    width: 62px;
    height: 62px;
    min-width: 62px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    border-radius: 50%;
    margin: 0 14px;
  }

  .icon-email   { background: linear-gradient(135deg, #f5a623, #e8720c); }
  .icon-whatsapp{ background: linear-gradient(135deg, #25D366, #128C7E); }
  .icon-facebook{ background: linear-gradient(135deg, #1877F2, #0d5ecf); }
  .icon-phone   { background: linear-gradient(135deg, #34c759, #1a9e42); }
  .icon-service { background: linear-gradient(135deg, #af52de, #7b2fbe); }

  .contact-info {
    flex: 1;
    padding: 14px 0;
  }

  .contact-label {
    font-size: 16px;
    font-weight: 700;
  }

  .contact-value {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 2px;
    direction: ltr;
    text-align: right;
  }

  .contact-more {
    width: 36px;
    height: 36px;
    background: rgba(255,255,255,0.07);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-left: 14px;
    font-size: 18px;
    color: var(--blue-light);
  }

  .contact-card:nth-child(1) { animation-delay: 0.1s; }
  .contact-card:nth-child(2) { animation-delay: 0.2s; }
  .contact-card:nth-child(3) { animation-delay: 0.3s; }
  .contact-card:nth-child(4) { animation-delay: 0.4s; }
  .contact-card:nth-child(5) { animation-delay: 0.5s; }
</style>
</head>
